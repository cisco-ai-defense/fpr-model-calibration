name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format --check)
        run: ruff format --check .

      - name: Type check (ty)
        run: ty check src tests

      - name: Unit tests (pytest with coverage)
        run: pytest --cov=fpr_model_calibration --cov-report=term-missing

      - name: Security audit (pip-audit)
        # --strict would fail on the self editable install; --skip-editable suppresses it.
        run: pip-audit --skip-editable

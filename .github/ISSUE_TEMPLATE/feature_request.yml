name: Feature request
description: Propose a focused improvement to FPRCal
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the calibration use case or limitation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the public behavior you want and include an example when useful.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe existing approaches or workarounds you evaluated.
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility considerations
      description: Identify API, model-artifact, or release compatibility implications.

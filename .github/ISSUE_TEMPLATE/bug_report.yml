name: Bug report
description: Report reproducible incorrect behavior in FPRCal
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Follow SECURITY.md instead.
  - type: input
    id: fprcal-version
    attributes:
      label: FPRCal version
      description: Run `python -c "import fprcal; print(fprcal.__version__)"`.
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.4"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide the smallest runnable example that demonstrates the problem.
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the complete error message or traceback when applicable.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include operating system details or other relevant constraints.

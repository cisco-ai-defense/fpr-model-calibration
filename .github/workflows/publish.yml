name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Verify release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [[ "$RELEASE_TAG" != "v${PACKAGE_VERSION}" ]]; then
            echo "Release tag $RELEASE_TAG does not match package version v${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Install packaging tools
        run: python -m pip install --upgrade build twine

      - name: Build wheel and source distribution
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check --strict dist/*

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish distributions
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fprcal
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  verify:
    name: Verify published package (Python ${{ matrix.python-version }})
    needs: publish
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the published release from PyPI
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: python -m pip install --no-cache-dir "fprcal==${RELEASE_TAG#v}"

      - name: Verify version and public behavior
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python -c "import importlib.metadata as m; import numpy as np; from fprcal import fit_calibration_pipeline; version = m.version('fprcal'); assert version == '${RELEASE_TAG#v}'; pipeline = fit_calibration_pipeline(np.linspace(0.0, 0.8, 100), n_knots=100); predictions = pipeline.predict(np.array([[0.1], [0.9]])); assert predictions.shape == (2,); assert predictions[0] <= predictions[1]"
